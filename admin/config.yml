backend:
  name: github
  repo: franckbali/vf-images
  branch: main

media_folder: "images"
public_folder: "/images"

locale: fr

collections:
  - name: "galeries"
    label: "Galeries photos"
    files:
      - name: "galeries"
        label: "Liste des galeries"
        file: "galeries.json"
        fields:
          - name: "galeries"
            label: "Galeries"
            widget: "list"
            fields:
              - {label: "Titre", name: "titre", widget: "string"}
              - {label: "Sous-titre", name: "sous_titre", widget: "string"}
              - {label: "Image cover", name: "image_cover", widget: "image"}
              - {label: "Orientation", name: "orientation", widget: "select", options: ["portrait", "landscape"]}
              - {label: "Slug", name: "slug", widget: "string"}
              - {label: "Page", name: "page", widget: "string"}
              - {label: "Ordre", name: "ordre", widget: "number", value_type: "int"}
              - {label: "Visible", name: "visible", widget: "boolean", default: true}

  - name: "blog"
    label: "Articles de blog"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Image principale", name: "image", widget: "image", required: false}
      - {label: "Contenu", name: "body", widget: "markdown"}

  - name: "accueil"
    label: "Accueil"
    files:
      - name: "accueil"
        label: "Photos de l'accueil"
        file: "accueil.json"
        fields:
          - name: "portfolio"
            label: "Portfolio (grille d'accueil)"
            widget: "list"
            fields:
              - {label: "Fichier image", name: "fichier", widget: "image"}
              - {label: "Légende",       name: "legende", widget: "string"}
              - {label: "Visible",       name: "visible", widget: "boolean", default: true}
          - name: "apropos"
            label: "Photo — section À propos"
            widget: "object"
            fields:
              - {label: "Fichier image", name: "fichier", widget: "image"}
              - {label: "Légende",       name: "legende", widget: "string"}
              - {label: "Visible",       name: "visible", widget: "boolean", default: true}
          - name: "cta"
            label: "Photo de fond — section CTA"
            widget: "object"
            fields:
              - {label: "Fichier image", name: "fichier", widget: "image"}
              - {label: "Légende",       name: "legende", widget: "string"}
              - {label: "Visible",       name: "visible", widget: "boolean", default: true}

  - name: "boutique"
    label: "Boutique"
    files:
      - name: "boutique"
        label: "Liste des produits"
        file: "boutique.json"
        fields:
          - name: "produits"
            label: "Produits"
            widget: "list"
            fields:
              - {label: "Titre", name: "titre", widget: "string"}
              - {label: "Sous-titre", name: "sous_titre", widget: "string", required: false}
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Prix (€)", name: "prix", widget: "number", value_type: "float"}
              - {label: "Format", name: "format", widget: "string", required: false}
              - {label: "Édition", name: "edition", widget: "string", required: false}
              - {label: "Slug", name: "slug", widget: "string"}
              - {label: "Visible", name: "visible", widget: "boolean", default: true}
